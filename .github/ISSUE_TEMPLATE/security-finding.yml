name: Security finding
description: Track security findings with ownership, SLA, and closure evidence.
title: "[Security] <short finding title>"
labels:
  - security
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: dropdown
    id: disposition
    attributes:
      label: Disposition
      options:
        - Remediate
        - Accepted-Risk
        - Intentional-Vuln
    validations:
      required: true

  - type: input
    id: owner
    attributes:
      label: Owner
      placeholder: "@username"
    validations:
      required: true

  - type: input
    id: due_date
    attributes:
      label: Due date
      description: "Use YYYY-MM-DD"
      placeholder: "2026-06-01"
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: Status
      options:
        - Open
        - In Progress
        - Blocked
        - Resolved
    validations:
      required: true

  - type: textarea
    id: impacted_scope
    attributes:
      label: Impacted files/resources
      description: "List paths/components and trust boundaries."
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: "Scan output, code diffs, exception approval links, or test evidence."
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: "Add risk acceptance rationale and compensating controls if needed."
